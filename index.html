<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeetingDesk</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0f0f1a;
  --paper: #f7f3ec;
  --cream: #eee9df;
  --gold: #c8a850;
  --gold2: #e2c57a;
  --rust: #7a3b1e;
  --sage: #4a6e55;
  --muted: rgba(15,15,26,0.45);
  --border: rgba(200,168,80,0.25);
  --shadow: 0 8px 40px rgba(15,15,26,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--ink);color:var(--ink);min-height:100vh;overflow-x:hidden;}
.bg-pattern{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 10% 20%,rgba(200,168,80,.07) 0%,transparent 70%),radial-gradient(ellipse 60% 80% at 90% 80%,rgba(74,110,85,.06) 0%,transparent 70%),var(--ink);}
.bg-pattern::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(200,168,80,.07) 1px,transparent 1px);background-size:40px 40px;}
.page{display:none;position:relative;z-index:1;}
.page.active{display:block;}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .4s;}
.loading-overlay.hide{opacity:0;pointer-events:none;}
.spin{width:40px;height:40px;border-radius:50%;border:2px solid rgba(200,168,80,.2);border-top-color:var(--gold);animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-inner{text-align:center;}
.loader-inner p{font-family:'Cormorant Garamond',serif;color:var(--gold2);font-size:1.1rem;}

/* ── AUTH CARD ── */
#authPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--paper);border-radius:20px;width:100%;max-width:440px;padding:48px 44px;box-shadow:0 24px 80px rgba(0,0,0,.4);border:1px solid rgba(200,168,80,.2);animation:cardIn .5s cubic-bezier(.22,1,.36,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo .icon{font-size:2.4rem;display:block;margin-bottom:10px;}
.auth-logo h1{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--ink);}
.auth-logo p{font-size:.8rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px;}
.auth-tabs{display:flex;background:var(--cream);border-radius:10px;padding:4px;margin-bottom:24px;}
.auth-tab{flex:1;padding:9px;border:none;background:none;border-radius:7px;font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;}
.auth-tab.active{background:var(--ink);color:var(--gold2);box-shadow:0 2px 8px rgba(15,15,26,.2);}
.fg2{margin-bottom:14px;}
.fg2 label{display:block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);font-weight:600;margin-bottom:6px;}
.fg2 input{width:100%;padding:12px 16px;background:white;border:1.5px solid var(--border);border-radius:8px;font-family:'Outfit',sans-serif;font-size:.92rem;color:var(--ink);outline:none;transition:border-color .2s,box-shadow .2s;}
.fg2 input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,168,80,.12);}
.btn-primary{width:100%;padding:13px;background:var(--ink);color:var(--gold2);border:none;border-radius:8px;font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:background .2s,transform .1s;margin-top:4px;}
.btn-primary:hover{background:#1e1e35;}
.btn-primary:active{transform:scale(.98);}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.btn-google{width:100%;padding:12px;background:white;border:1.5px solid var(--border);border-radius:8px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;}
.btn-google:hover{border-color:var(--gold);box-shadow:0 2px 12px rgba(200,168,80,.1);}
.btn-google svg{width:20px;height:20px;}
.auth-error{background:#fff0f0;border:1px solid #ffcccc;border-radius:6px;padding:10px 14px;font-size:.82rem;color:#c0392b;margin-bottom:14px;display:none;}
.auth-error.show{display:block;}
.forgot-link{text-align:right;margin-top:-8px;margin-bottom:14px;}
.forgot-link a{font-size:.78rem;color:var(--sage);text-decoration:none;cursor:pointer;}
.forgot-link a:hover{text-decoration:underline;}
.setup-box{background:#fffbe6;border:1px solid #f0d060;border-radius:8px;padding:14px 16px;font-size:.8rem;color:#7a5e00;margin-bottom:20px;line-height:1.7;}
.setup-box strong{color:#4a3800;}
.setup-box code{background:rgba(120,100,0,.1);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:.78rem;}

/* ── APP HEADER ── */
#appPage{background:var(--paper);min-height:100vh;}
header{background:var(--ink);padding:0 32px;height:62px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:30;}
.header-logo{font-family:'Cormorant Garamond',serif;color:var(--gold2);font-size:1.5rem;font-weight:700;}
.header-right{display:flex;align-items:center;gap:14px;}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(200,168,80,.1);border:1px solid rgba(200,168,80,.2);border-radius:24px;padding:5px 14px 5px 5px;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--rust));display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:white;font-family:'Cormorant Garamond',serif;}
.user-name{font-size:.8rem;color:rgba(245,240,232,.8);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-signout{background:none;border:1px solid rgba(200,168,80,.3);color:rgba(245,240,232,.5);border-radius:6px;padding:6px 12px;font-size:.75rem;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .15s;letter-spacing:.06em;text-transform:uppercase;}
.btn-signout:hover{border-color:var(--gold);color:var(--gold2);}

/* ── APP BODY ── */
.app-body{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 62px);}
.sidebar{background:var(--cream);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-section{padding:20px;border-bottom:1px solid rgba(200,168,80,.15);}
.sidebar-section h2{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--rust);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;}
.fg{margin-bottom:11px;}
.fg label{display:block;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);font-weight:600;margin-bottom:5px;}
.fg input,.fg select{width:100%;padding:9px 12px;background:var(--paper);border:1.5px solid var(--border);border-radius:6px;font-family:'Outfit',sans-serif;font-size:.88rem;color:var(--ink);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,168,80,.1);}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-add{width:100%;padding:11px;background:var(--ink);color:var(--gold2);border:none;border-radius:6px;font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:background .2s,transform .1s;margin-top:4px;}
.btn-add:hover{background:#1e1e35;}
.btn-add:active{transform:scale(.98);}
.client-list{flex:1;padding:14px;overflow-y:auto;}
.client-list h2{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--rust);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;padding:0 6px;}
.client-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:5px;transition:all .15s;}
.client-item:hover{background:rgba(200,168,80,.08);border-color:var(--border);}
.client-item.active{background:var(--ink);border-color:var(--gold);}
.client-item.active .cname{color:var(--gold2);}
.client-item.active .cmeta{color:rgba(245,240,232,.4);}
.cavatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.8rem;font-weight:700;color:white;flex-shrink:0;}
.cinfo{flex:1;min-width:0;}
.cname{font-weight:500;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cmeta{font-size:.72rem;color:var(--muted);margin-top:2px;}
.cbadge{background:var(--gold);color:var(--ink);font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:12px;}
.no-clients{text-align:center;padding:28px 12px;color:var(--muted);font-size:.82rem;font-style:italic;}

/* ── MAIN / CALENDAR ── */
.main{padding:28px;overflow-y:auto;}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.main-header h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--ink);}
.nav-btns{display:flex;gap:8px;align-items:center;}
.nav-btn{width:34px;height:34px;border:1px solid var(--border);background:transparent;border-radius:6px;cursor:pointer;font-size:1rem;color:var(--ink);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:var(--ink);color:var(--gold2);border-color:var(--ink);}
.month-label{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;min-width:160px;text-align:center;color:var(--rust);letter-spacing:.05em;}
.calendar-grid{background:white;border-radius:12px;box-shadow:var(--shadow);overflow:visible;border:1px solid var(--border);}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);background:var(--ink);border-radius:12px 12px 0 0;}
.cal-day-name{padding:11px;text-align:center;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold2);font-weight:500;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:82px;border-right:1px solid rgba(200,168,80,.08);border-bottom:1px solid rgba(200,168,80,.08);padding:8px;position:relative;cursor:pointer;transition:background .15s;overflow:visible;z-index:1;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-month{background:rgba(247,243,236,.5);cursor:default;}
.cal-cell.today{background:rgba(200,168,80,.05);}
.cal-cell.today .date-num{color:var(--gold);font-weight:700;}
.cal-cell.has-meeting .date-num{background:var(--gold);color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cal-cell:not(.other-month):hover{background:rgba(200,168,80,.05);}
.cal-cell.has-meeting:hover{background:rgba(200,168,80,.08);}
.date-num{font-size:.78rem;font-weight:500;color:rgba(15,15,26,.65);margin-bottom:2px;}
.cal-cell.other-month .date-num{color:rgba(15,15,26,.2);}
.meeting-count-badge{position:absolute;bottom:6px;right:6px;background:var(--ink);color:var(--gold2);font-size:.58rem;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

/* ── DATE POPUP ── */
.date-popup{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--ink);border:1px solid var(--gold);border-radius:10px;padding:14px 16px;min-width:200px;z-index:100;box-shadow:0 12px 40px rgba(0,0,0,.35);animation:popIn .18s cubic-bezier(.22,1,.36,1);}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(-8px) scale(.94);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
.date-popup::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:6px solid var(--gold);}
.date-popup.open{display:block;}
.popup-label{font-family:'Cormorant Garamond',serif;font-size:.78rem;color:var(--gold2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.popup-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(200,168,80,.12);cursor:pointer;transition:opacity .1s;}
.popup-row:hover{opacity:.8;}
.popup-row:last-child{border-bottom:none;}
.popup-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.popup-name{font-size:.78rem;color:rgba(245,240,232,.9);font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.popup-time{font-size:.75rem;color:var(--gold2);font-weight:600;white-space:nowrap;}
.popup-empty{font-size:.78rem;color:rgba(245,240,232,.3);font-style:italic;text-align:center;padding:4px 0;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,15,26,.65);backdrop-filter:blur(5px);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--paper);border-radius:14px;padding:32px;max-width:440px;width:90%;border:1px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.3);animation:modalIn .25s cubic-bezier(.22,1,.36,1);}
@keyframes modalIn{from{opacity:0;transform:scale(.93) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--ink);}
.modal-sub{font-size:.75rem;color:var(--sage);margin-top:3px;letter-spacing:.05em;}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);line-height:1;transition:color .15s;}
.modal-close:hover{color:var(--ink);}
.modal-info{background:var(--cream);border-radius:8px;padding:18px;margin-bottom:14px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(200,168,80,.12);}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sage);font-weight:600;}
.info-val{font-size:.88rem;font-weight:500;color:var(--ink);}
.modal-time-big{text-align:center;padding:16px;background:var(--ink);border-radius:8px;margin-top:10px;}
.modal-time-big .t{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold2);}
.modal-time-big .tl{font-size:.72rem;color:rgba(245,240,232,.4);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.btn-del{width:100%;margin-top:14px;padding:9px;background:transparent;border:1px solid rgba(122,59,30,.3);color:var(--rust);border-radius:6px;font-family:'Outfit',sans-serif;font-size:.82rem;cursor:pointer;transition:all .15s;letter-spacing:.05em;}
.btn-del:hover{background:var(--rust);color:white;border-color:var(--rust);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--gold2);padding:11px 18px;border-radius:8px;font-size:.83rem;border-left:3px solid var(--gold);transform:translateY(80px);opacity:0;transition:all .3s ease;z-index:300;}
.toast.show{transform:translateY(0);opacity:1;}
.welcome-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;color:var(--muted);}
.welcome-state .icon{font-size:2.8rem;margin-bottom:14px;}
.welcome-state h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;margin-bottom:6px;color:rgba(15,15,26,.4);}
.welcome-state p{font-size:.82rem;max-width:280px;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@media(max-width:768px){
  .app-body{grid-template-columns:1fr;}
  .sidebar{max-height:50vh;}
  .main{padding:16px;}
  header{padding:0 16px;}
  .user-name{display:none;}
  .cal-cell{min-height:60px;}
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-inner">
    <div class="spin"></div>
    <p>MeetingDesk</p>
  </div>
</div>

<div class="bg-pattern"></div>

<!-- ══════════ AUTH PAGE ══════════ -->
<div class="page active" id="authPage">
  <div id="authWrap" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="auth-card">

      <div class="auth-logo">
        <span class="icon">📅</span>
        <h1>MeetingDesk</h1>
        <p>Private Meeting Scheduler</p>
      </div>

      <!-- Firebase setup complete -->
      <div class="setup-box" id="setupBox" style="display:none"></div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
      </div>

      <div id="authError" class="auth-error"></div>

      <!-- LOGIN -->
      <div id="loginForm">
        <div class="fg2"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"/></div>
        <div class="fg2"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')signInEmail()"/></div>
        <div class="forgot-link"><a onclick="forgotPassword()">Forgot password?</a></div>
        <button class="btn-primary" onclick="signInEmail()">Sign In</button>
      </div>

      <!-- SIGNUP -->
      <div id="signupForm" style="display:none">
        <div class="fg2"><label>Full Name</label><input type="text" id="signupName" placeholder="Your name"/></div>
        <div class="fg2"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"/></div>
        <div class="fg2"><label>Password</label><input type="password" id="signupPassword" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')createAccount()"/></div>
        <button class="btn-primary" onclick="createAccount()">Create Account</button>
      </div>

      <div class="divider">or</div>

      <button class="btn-google" onclick="signInGoogle()">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<!-- ══════════ APP PAGE ══════════ -->
<div class="page" id="appPage">
  <header>
    <div class="header-logo">📅 MeetingDesk</div>
    <div class="header-right">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">?</div>
        <span class="user-name" id="userName"></span>
      </div>
      <button class="btn-signout" onclick="doSignOut()">Sign Out</button>
    </div>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h2>Add Meeting</h2>
        <div class="fg"><label>Client Name</label><input type="text" id="clientName" placeholder="e.g. John Smith"/></div>
        <div class="frow">
          <div class="fg"><label>Day</label>
            <select id="meetDay"><option value="">Day</option><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select>
          </div>
          <div class="fg"><label>Date</label><input type="number" id="meetDate" placeholder="1–31" min="1" max="31"/></div>
          <div class="fg"><label>Month</label>
            <select id="meetMonth"><option value="">Mon</option><option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option><option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option><option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option><option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option></select>
          </div>
        </div>
        <div class="frow2">
          <div class="fg"><label>Year</label><input type="number" id="meetYear" min="2020" max="2100"/></div>
          <div class="fg"><label>Time</label><input type="time" id="meetTime"/></div>
        </div>
        <button class="btn-add" onclick="addMeeting()">+ Schedule Meeting</button>
      </div>
      <div class="client-list">
        <h2>Clients</h2>
        <div id="clientList"><p class="no-clients">No meetings yet.</p></div>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <h2 id="calTitle">Calendar</h2>
        <div class="nav-btns">
          <button class="nav-btn" onclick="prevMonth()">&#8592;</button>
          <span class="month-label" id="monthLabel"></span>
          <button class="nav-btn" onclick="nextMonth()">&#8594;</button>
        </div>
      </div>
      <div id="calendarArea">
        <div class="welcome-state"><div class="icon">🗓️</div><h3>Your calendar awaits</h3><p>Add a client meeting to get started.</p></div>
      </div>
    </main>
  </div>
</div>

<!-- MEETING DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div><div class="modal-title" id="modalClientName"></div><div class="modal-sub">Meeting Details</div></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-info">
      <div class="info-row"><span class="info-lbl">Date</span><span class="info-val" id="modalDate"></span></div>
      <div class="info-row"><span class="info-lbl">Day</span><span class="info-val" id="modalDay"></span></div>
      <div class="info-row"><span class="info-lbl">Month</span><span class="info-val" id="modalMonth"></span></div>
      <div class="info-row"><span class="info-lbl">Year</span><span class="info-val" id="modalYear"></span></div>
    </div>
    <div class="modal-time-big"><div class="t" id="modalTime"></div><div class="tl">Meeting Time</div></div>
    <button class="btn-del" id="deleteBtn">Delete Meeting</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════════════
  FIREBASE — Replace the config object below with yours
═══════════════════════════════════════════════════════ -->
<script type="module">
/*
  FIRESTORE SECURITY RULES (paste in Firebase Console → Firestore → Rules):
  ─────────────────────────────────────────────────────────────
  rules_version = '2';
  service cloud.firestore {
    match /databases/{database}/documents {
      match /users/{uid}/meetings/{meetingId} {
        allow read, write: if request.auth != null && request.auth.uid == uid;
      }
    }
  }
  ─────────────────────────────────────────────────────────────
*/

const firebaseConfig = {
  apiKey:            "AIzaSyC7Gj6A5kfegHtq2PM1uOjD67V-cLkLXxU",
  authDomain:        "meeting-calender-884f0.firebaseapp.com",
  projectId:         "meeting-calender-884f0",
  storageBucket:     "meeting-calender-884f0.firebasestorage.app",
  messagingSenderId: "183531008292",
  appId:             "1:183531008292:web:a2ff1ae0198afe20ff43b1"
};

import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword,
         createUserWithEmailAndPassword, GoogleAuthProvider,
         signInWithPopup, signOut as fbSignOut, updateProfile,
         sendPasswordResetEmail }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs,
         deleteDoc, doc, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Constants ──
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const PALETTE = ['#2c3e7a','#5a3e2b','#2a5a3e','#6b3a5a','#3a5a6b','#5a5a2a','#4a2a6b','#6b2a2a','#3a6b4a','#6b4a2a'];

// ── App state ──
let meetings = [];
let currentMonth = new Date().getMonth();
let currentYear  = new Date().getFullYear();
let selectedClient = null;
let currentUid = null;

// ── Utils ──
const $ = id => document.getElementById(id);
const getInitials = n => n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
function getColor(n){ let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))&0xffffff; return PALETTE[Math.abs(h)%PALETTE.length]; }
function formatTime(t){
  if(!t) return 'N/A';
  const [h,m]=t.split(':'); const hr=parseInt(h);
  return `${hr>12?hr-12:hr||12}:${m} ${hr>=12?'PM':'AM'}`;
}
function showToast(msg){ const el=$('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800); }
function showError(msg){ const el=$('authError'); el.textContent=msg; el.classList.add('show'); }
function clearError(){ $('authError').classList.remove('show'); }
function friendlyError(code){
  return {
    'auth/invalid-email':'Invalid email address.',
    'auth/user-not-found':'No account found with this email.',
    'auth/wrong-password':'Incorrect password.',
    'auth/email-already-in-use':'This email is already registered.',
    'auth/weak-password':'Password must be at least 6 characters.',
    'auth/too-many-requests':'Too many attempts. Please try again later.',
    'auth/popup-blocked':'Popup was blocked — allow popups for this site.',
    'auth/invalid-credential':'Invalid email or password.',
    'auth/network-request-failed':'Network error. Check your connection.',
  }[code] || 'Something went wrong. Please try again.';
}

// ── Auth state ──
onAuthStateChanged(auth, async user => {
  $('loadingOverlay').classList.add('hide');
  if (user) {
    currentUid = user.uid;
    $('userName').textContent = user.displayName || user.email;
    $('userAvatar').textContent = getInitials(user.displayName || user.email || 'U');
    $('setupBox').style.display = 'none';
    $('authPage').classList.remove('active');
    $('appPage').classList.add('active');
    $('meetYear').value = new Date().getFullYear();
    await loadMeetings();
    renderClientList();
    renderCalendar();
  } else {
    currentUid = null; meetings = [];
    $('appPage').classList.remove('active');
    $('authPage').classList.add('active');
  }
});

// ── Exposed to HTML ──
window.switchTab = tab => {
  clearError();
  $('tabLogin').classList.toggle('active', tab==='login');
  $('tabSignup').classList.toggle('active', tab==='signup');
  $('loginForm').style.display  = tab==='login'  ? '' : 'none';
  $('signupForm').style.display = tab==='signup' ? '' : 'none';
};

window.signInEmail = async () => {
  clearError();
  const email=$('loginEmail').value.trim(), pass=$('loginPassword').value;
  if(!email||!pass){ showError('Please fill in all fields.'); return; }
  try { await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){ showError(friendlyError(e.code)); }
};

window.createAccount = async () => {
  clearError();
  const name=$('signupName').value.trim(), email=$('signupEmail').value.trim(), pass=$('signupPassword').value;
  if(!name||!email||!pass){ showError('Please fill in all fields.'); return; }
  if(pass.length<6){ showError('Password must be at least 6 characters.'); return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:name});
  } catch(e){ showError(friendlyError(e.code)); }
};

window.signInGoogle = async () => {
  clearError();
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ if(e.code!=='auth/popup-closed-by-user') showError(friendlyError(e.code)); }
};

window.forgotPassword = async () => {
  const email=$('loginEmail').value.trim();
  if(!email){ showError('Enter your email address above first.'); return; }
  try { await sendPasswordResetEmail(auth,email); showToast('✉️ Password reset email sent!'); }
  catch(e){ showError(friendlyError(e.code)); }
};

window.doSignOut = async () => { await fbSignOut(auth); };

// ── Firestore ──
async function loadMeetings(){
  meetings = [];
  try {
    const q = query(collection(db,'users',currentUid,'meetings'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    snap.forEach(d => meetings.push({id:d.id,...d.data()}));
  } catch(e){ console.error('Load error:',e); }
}

window.addMeeting = async () => {
  const name  = $('clientName').value.trim();
  const day   = $('meetDay').value;
  const date  = parseInt($('meetDate').value);
  const month = $('meetMonth').value;
  const year  = parseInt($('meetYear').value);
  const time  = $('meetTime').value;
  if(!name)            { showToast('⚠️ Enter client name'); return; }
  if(!date||isNaN(date)){ showToast('⚠️ Enter valid date'); return; }
  if(month==='')       { showToast('⚠️ Select a month'); return; }
  if(!year||isNaN(year)){ showToast('⚠️ Enter year'); return; }
  if(!time)            { showToast('⚠️ Enter meeting time'); return; }
  const data = {name,day,date,month:parseInt(month),year,time,createdAt:Date.now()};
  try {
    const ref = await addDoc(collection(db,'users',currentUid,'meetings'), data);
    meetings.unshift({id:ref.id,...data});
    renderClientList(); renderCalendar();
    showToast(`✓ Meeting with ${name} scheduled!`);
    $('clientName').value=''; $('meetDay').value=''; $('meetDate').value='';
    $('meetMonth').value=''; $('meetTime').value='';
  } catch(e){ showToast('❌ Save failed — check Firebase config.'); console.error(e); }
};

window.deleteMeeting = async id => {
  try {
    await deleteDoc(doc(db,'users',currentUid,'meetings',id));
    meetings = meetings.filter(m=>m.id!==id);
    closeModalDirect(); renderClientList(); renderCalendar();
    showToast('Meeting deleted.');
  } catch(e){ showToast('❌ Delete failed.'); }
};

// ── Render ──
function renderClientList(){
  const list=$('clientList');
  if(!meetings.length){ list.innerHTML='<p class="no-clients">No meetings yet.</p>'; return; }
  const map={};
  meetings.forEach(m=>{ map[m.name]=(map[m.name]||0)+1; });
  list.innerHTML = Object.entries(map).map(([name,count])=>{
    const bg=getColor(name), active=selectedClient===name?'active':'';
    return `<div class="client-item ${active}" onclick="selectClient('${name.replace(/'/g,"\\'")}')">
      <div class="cavatar" style="background:${bg}">${getInitials(name)}</div>
      <div class="cinfo"><div class="cname">${name}</div><div class="cmeta">${count} meeting${count>1?'s':''}</div></div>
      <span class="cbadge">${count}</span>
    </div>`;
  }).join('');
}

window.selectClient = name => {
  selectedClient = selectedClient===name ? null : name;
  if(selectedClient){
    const first=meetings.find(m=>m.name===selectedClient);
    if(first){ currentMonth=first.month; currentYear=first.year; }
  }
  renderClientList(); renderCalendar();
};

function renderCalendar(){
  const area=$('calendarArea');
  $('monthLabel').textContent=`${MONTHS[currentMonth]} ${currentYear}`;
  $('calTitle').textContent=selectedClient?`${selectedClient}'s Schedule`:'All Meetings';
  if(!meetings.length){
    area.innerHTML=`<div class="welcome-state"><div class="icon">🗓️</div><h3>Your calendar awaits</h3><p>Add a client meeting to get started.</p></div>`;
    return;
  }
  const filtered=meetings.filter(m=>(!selectedClient||m.name===selectedClient)&&m.month===currentMonth&&m.year===currentYear);
  const firstDay=new Date(currentYear,currentMonth,1).getDay();
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const daysInPrev=new Date(currentYear,currentMonth,0).getDate();
  const today=new Date();
  let cells=[];
  for(let i=firstDay-1;i>=0;i--) cells.push({d:daysInPrev-i,current:false});
  for(let d=1;d<=daysInMonth;d++) cells.push({d,current:true});
  let next=1; while(cells.length%7!==0) cells.push({d:next++,current:false});
  area.innerHTML=`
    <div class="calendar-grid">
      <div class="cal-header">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}</div>
      <div class="cal-body" style="grid-template-rows:repeat(${Math.ceil(cells.length/7)},1fr)">
        ${cells.map(cell=>{
          const isToday=cell.current&&cell.d===today.getDate()&&currentMonth===today.getMonth()&&currentYear===today.getFullYear();
          const cm=cell.current?filtered.filter(m=>m.date===cell.d):[];
          const key=`${currentYear}-${currentMonth}-${cell.d}-${cell.current?1:0}`;
          const rows=cm.length
            ?cm.map(m=>`<div class="popup-row" onclick="openModal('${m.id}');event.stopPropagation()"><div class="popup-dot" style="background:${getColor(m.name)}"></div><span class="popup-name">${m.name}</span><span class="popup-time">${formatTime(m.time)}</span></div>`).join('')
            :`<div class="popup-empty">Not scheduled</div>`;
          return `<div class="cal-cell ${!cell.current?'other-month':''} ${isToday?'today':''} ${cm.length?'has-meeting':''}" onclick="togglePopup(event,'${key}')">
            <div class="date-num">${cell.d}</div>
            ${cm.length?`<div class="meeting-count-badge">${cm.length}</div>`:''}
            <div class="date-popup" id="popup-${key}">
              <div class="popup-label">${MONTHS[currentMonth].slice(0,3)} ${cell.d}, ${currentYear}</div>
              ${rows}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

window.togglePopup = (e,key) => {
  e.stopPropagation();
  const popup=document.getElementById('popup-'+key); if(!popup) return;
  const isOpen=popup.classList.contains('open');
  document.querySelectorAll('.date-popup.open').forEach(p=>p.classList.remove('open'));
  if(!isOpen) popup.classList.add('open');
};

document.addEventListener('click',()=>{
  document.querySelectorAll('.date-popup.open').forEach(p=>p.classList.remove('open'));
});

window.openModal = id => {
  const m=meetings.find(x=>x.id===id); if(!m) return;
  $('modalClientName').textContent=m.name;
  $('modalDate').textContent=m.date;
  $('modalDay').textContent=m.day||'—';
  $('modalMonth').textContent=MONTHS[m.month];
  $('modalYear').textContent=m.year;
  $('modalTime').textContent=formatTime(m.time);
  $('deleteBtn').onclick=()=>deleteMeeting(id);
  $('modalOverlay').classList.add('open');
};

window.closeModal = e => { if(e.target===$('modalOverlay')) closeModalDirect(); };
window.closeModalDirect = () => $('modalOverlay').classList.remove('open');
window.prevMonth = () => { if(currentMonth===0){currentMonth=11;currentYear--;}else currentMonth--; renderCalendar(); };
window.nextMonth = () => { if(currentMonth===11){currentMonth=0;currentYear++;}else currentMonth++; renderCalendar(); };

</script>
</body>
</html>
